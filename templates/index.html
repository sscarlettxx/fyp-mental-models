<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>{{ title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: system-ui, Arial, sans-serif; max-width: 900px; margin: 32px auto; padding: 0 16px; }
    a { text-decoration: none; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 16px; margin: 12px 0; }
    .muted { color: #666; }
    .btn { display: inline-block; padding: 10px 14px; border: 1px solid #333; border-radius: 10px; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>{{ title }}</h1>

  <p class="muted">Choose a topic section to begin.</p>

  {% for category in categories %}
    <div class="card">
      <h2 style="margin-top:0;">{{ category.label }}</h2>
      <p>{{ category.description }}</p>
      <p class="muted">Exercises in this section: {{ category.count }}</p>
      {% if category.first_exercise_id %}
        <a class="btn" href="{{ url_for('topic_page', category_key=category.key) }}">Open section</a>
      {% endif %}
    </div>
  {% endfor %}
</body>
</html>
